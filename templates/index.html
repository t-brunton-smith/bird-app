<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Phlock — Bird Sightings</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary:       #5f7a5f;
            --primary-dark:  #3b5240;
            --primary-light: #edf2ea;
            --gold:          #c8881a;
            --gold-dark:     #a86f10;
            --gold-light:    #fdf5e6;
            --brown:         #6b4226;
            --brown-dark:    #4a2c18;
            --text:          #2a2018;
            --muted:         #786e5e;
            --border:        #cdd5c5;
            --bg:            #f1f4ee;
            --surface:       #ffffff;
            --radius:        10px;
            --shadow:        0 4px 20px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-size: 16px;
            color: var(--text);
        }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(150deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 44px 24px 36px;
            text-align: center;
            color: white;
        }

        .hero img {
            height: 92px;
            width: auto;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin: 10px 0 6px;
            letter-spacing: 0.01em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .hero p {
            font-family: 'AntipastoPro', sans-serif;
            font-size: 1rem;
            margin: 0;
            opacity: 0.88;
        }

        .hero-links {
            margin-top: 14px;
            font-size: 13px;
            opacity: 0.75;
        }

        .hero-links a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.45);
            transition: opacity 0.15s;
        }

        .hero-links a:hover { opacity: 1; }

        /* ── Form card ── */
        .page-container {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: var(--shadow);
        }

        /* ── Form elements ── */
        .form-group { margin: 0 0 20px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-family: 'AntipastoPro', sans-serif;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], select {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            font-size: 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
            appearance: auto;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(95,122,95,0.15);
        }

        input[type="text"]:disabled {
            background: #f5f7f3;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--gold);
            height: 4px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            background: var(--gold);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 11px;
            border-radius: 20px;
            min-width: 56px;
            text-align: center;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .notable-label {
            color: var(--text);
            font-family: 'AntipastoPro', sans-serif;
            font-size: 0.95rem;
        }

        .hotspot-hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 5px;
            font-family: Arial, sans-serif;
        }

        .section-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Buttons ── */
        .btn-location {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 9px;
            height: 34px;
            padding: 0 13px;
            font-size: 13px;
            font-family: 'AntipastoPro', sans-serif;
            font-weight: bold;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .btn-location:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            height: 50px;
            font-size: 16px;
            font-family: 'AntipastoPro', sans-serif;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: bold;
            transition: filter 0.15s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--gold);
            color: white;
        }

        .btn-primary:hover { filter: brightness(1.08); }

        .btn-secondary {
            background: var(--brown);
            color: white;
        }

        .btn-secondary:hover { filter: brightness(1.15); }

        /* ── Loading overlay ── */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.92);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            font-family: 'AntipastoPro', sans-serif;
            font-size: 18px;
            color: var(--muted);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">Searching…</p>
</div>

<div class="hero">
    <img src="{{ url_for('static', filename='icons/bird_icon_M.png') }}"
         srcset="{{ url_for('static', filename='icons/bird_icon_S.png') }} 1x,
                 {{ url_for('static', filename='icons/bird_icon_M.png') }} 2x"
         alt="bird icon">
    <h1>Phlock</h1>
    <p>Find recent bird sightings near you</p>
    <div class="hero-links"><a href="/how-it-works">How it works</a></div>
</div>

<div class="page-container">
    <div class="card">
        <form id="dataForm" method="get">

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location"
                       placeholder="City, park, address…" required>
                <button type="button" class="btn-location" id="use-location-button">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    Use my location
                </button>
            </div>

            <div class="form-group" id="hotspot-group" style="display:none;">
                <label for="hotspot-select">Nearby Hotspot (optional)</label>
                <select id="hotspot-select" name="loc_id">
                    <option value="">All locations in area</option>
                </select>
                <input type="hidden" id="loc_name" name="loc_name" value="">
                <div class="hotspot-hint" id="hotspot-hint"></div>
            </div>

            <div class="form-group">
                <label for="species_name">Species (optional)</label>
                <input type="text" id="species_name" name="species_name"
                       list="species-list" autocomplete="off"
                       placeholder="e.g. American Robin">
                <datalist id="species-list"></datalist>
            </div>

            <div class="form-group">
                <div class="toggle-row">
                    <label class="switch" style="margin:0;">
                        <input type="checkbox" name="notable" id="notable">
                        <span class="slider round"></span>
                    </label>
                    <span class="notable-label">Notable sightings only</span>
                </div>
            </div>

            <div class="section-label">Range</div>

            <div class="form-group">
                <label for="dist">
                    <div class="slider-header">
                        <span>Search radius</span>
                        <span class="slider-value"><span id="dist-value">25</span> km</span>
                    </div>
                </label>
                <input type="range" id="dist" name="dist" min="5" max="50" value="25"
                       oninput="document.getElementById('dist-value').textContent = this.value">
            </div>

            <div class="form-group">
                <label for="back">
                    <div class="slider-header">
                        <span>Days back</span>
                        <span class="slider-value"><span id="back-value">14</span> days</span>
                    </div>
                </label>
                <input type="range" id="back" name="back" min="1" max="30" value="14"
                       oninput="document.getElementById('back-value').textContent = this.value">
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary"
                        onclick="submitForm('/results')">List View</button>
                <button type="submit" class="btn btn-secondary"
                        onclick="submitForm('/map')">Map View</button>
            </div>

        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

<script>
    fetch('/api/species')
        .then(function(r) { return r.json(); })
        .then(function(names) {
            var dl = document.getElementById('species-list');
            names.forEach(function(name) {
                var opt = document.createElement('option');
                opt.value = name;
                dl.appendChild(opt);
            });
        });
</script>

<script>
    var speciesInput  = document.getElementById('species_name');
    var notableToggle = document.getElementById('notable');

    speciesInput.addEventListener('input', function() {
        var has = this.value.trim().length > 0;
        notableToggle.disabled = has;
        if (has) notableToggle.checked = false;
    });

    notableToggle.addEventListener('change', function() {
        speciesInput.disabled = this.checked;
        if (this.checked) speciesInput.value = '';
    });

    function loadHotspots() {
        var loc  = document.getElementById('location').value.trim();
        if (!loc) return;
        var dist = document.getElementById('dist').value;
        var hint = document.getElementById('hotspot-hint');
        var grp  = document.getElementById('hotspot-group');
        var sel  = document.getElementById('hotspot-select');
        hint.textContent = 'Finding hotspots…';
        grp.style.display = 'block';
        fetch('/api/hotspots?location=' + encodeURIComponent(loc) + '&dist=' + dist)
            .then(function(r) { return r.json(); })
            .then(function(hs) {
                sel.innerHTML = '<option value="">All locations in area</option>';
                hs.forEach(function(h) {
                    var o = document.createElement('option');
                    o.value = h.locId;
                    o.dataset.name = h.locName;
                    o.textContent = h.locName + (h.numSpecies ? ' (' + h.numSpecies + ' species)' : '');
                    sel.appendChild(o);
                });
                hint.textContent = hs.length + ' hotspot' + (hs.length !== 1 ? 's' : '') + ' found';
            })
            .catch(function() { hint.textContent = ''; });
    }

    document.getElementById('location').addEventListener('blur', loadHotspots);

    document.getElementById('hotspot-select').addEventListener('change', function() {
        var o = this.options[this.selectedIndex];
        document.getElementById('loc_name').value = o.dataset.name || '';
    });

    function submitForm(endpoint) {
        if (!document.getElementById('location').value) {
            alert('Please enter a location.');
            return;
        }
        document.getElementById('loading-overlay').style.display = 'flex';
        var form = document.getElementById('dataForm');
        form.action = endpoint;
        form.submit();
    }

    // Restore form state when returning from results/map via the ← Search link
    (function() {
        var p = new URLSearchParams(window.location.search);
        var loc = p.get('location');
        if (!loc) return;

        document.getElementById('location').value = loc;

        var dist = p.get('dist');
        if (dist) {
            document.getElementById('dist').value = dist;
            document.getElementById('dist-value').textContent = dist;
        }

        var back = p.get('back');
        if (back) {
            document.getElementById('back').value = back;
            document.getElementById('back-value').textContent = back;
        }

        var species = p.get('species_name');
        if (species) {
            document.getElementById('species_name').value = species;
            notableToggle.disabled = true;
        }

        if (p.get('notable') === 'on') {
            notableToggle.checked = true;
            speciesInput.disabled = true;
        }

        var locId   = p.get('loc_id');
        var locName = p.get('loc_name');
        var distVal = dist || 25;
        var grp  = document.getElementById('hotspot-group');
        var sel  = document.getElementById('hotspot-select');
        var hint = document.getElementById('hotspot-hint');

        if (locId) {
            document.getElementById('loc_name').value = locName || '';
            grp.style.display = 'block';
            hint.textContent = 'Loading hotspots…';
            fetch('/api/hotspots?location=' + encodeURIComponent(loc) + '&dist=' + distVal)
                .then(function(r) { return r.json(); })
                .then(function(hs) {
                    sel.innerHTML = '<option value="">All locations in area</option>';
                    hs.forEach(function(h) {
                        var o = document.createElement('option');
                        o.value = h.locId;
                        o.dataset.name = h.locName;
                        o.textContent = h.locName + (h.numSpecies ? ' (' + h.numSpecies + ' species)' : '');
                        if (h.locId === locId) o.selected = true;
                        sel.appendChild(o);
                    });
                    hint.textContent = hs.length + ' hotspot' + (hs.length !== 1 ? 's' : '') + ' found';
                })
                .catch(function() { hint.textContent = ''; });
        }
    })();
</script>
</body>
</html>
