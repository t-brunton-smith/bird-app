<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Recent Bird Sightings</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #f4f6f8;
            font-size: 16px;
        }

        .page-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 16px 32px;
        }

        .header-section {
            text-align: center;
            padding: 28px 0 8px;
        }

        .header-section img {
            height: 72px;
            width: auto;
        }

        h1 {
            font-family: 'FlyingBird', sans-serif;
            font-size: 2rem;
            margin: 8px 0 0;
            color: #1a1a2e;
        }

        .subtitle {
            font-family: 'AntipastoPro', sans-serif;
            color: #666;
            margin: 8px 0 24px;
            font-size: 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin: 0 0 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-family: 'AntipastoPro', sans-serif;
            color: #333;
            font-size: 0.95rem;
        }

        input[type="text"], select {
            width: 100%;
            height: 48px;
            padding: 8px 12px;
            font-size: 16px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: white;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }

        input[type="text"]:disabled {
            background: #f5f5f5;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 8px;
            accent-color: #007bff;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .slider-value {
            background: #007bff;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 12px;
            min-width: 52px;
            text-align: center;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notable-label {
            color: #444;
            font-family: 'AntipastoPro', sans-serif;
        }

        .hotspot-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            font-family: Arial, sans-serif;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            height: 48px;
            font-size: 16px;
            font-family: 'AntipastoPro', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.15s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover { background: #0056b3; }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover { background: #545b62; }

        .btn-location {
            width: 100%;
            height: 44px;
            font-size: 15px;
            font-family: 'AntipastoPro', sans-serif;
            border: 1.5px solid #007bff;
            border-radius: 8px;
            background: white;
            color: #007bff;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .btn-location:hover { background: #f0f7ff; }

        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 5px solid #ddd;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="font-family:'AntipastoPro',sans-serif; margin-top:20px; font-size:18px; color:#333;">Searching...</p>
</div>

<div class="page-container">
    <div class="header-section">
        <img src="{{ url_for('static', filename='icons/bird_icon_M.png') }}"
             srcset="{{ url_for('static', filename='icons/bird_icon_S.png') }} 1x,
                     {{ url_for('static', filename='icons/bird_icon_M.png') }} 2x"
             alt="bird icon">
        <h1>Phlock</h1>
        <p class="subtitle">Find recent bird sightings near you</p>
    </div>

    <div class="card">
        <form id="dataForm" method="get">

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="City, park, address…" required>
            </div>

            <div class="form-group" id="hotspot-group" style="display:none;">
                <label for="hotspot-select">Nearby Hotspot (optional)</label>
                <select id="hotspot-select" name="loc_id">
                    <option value="">All locations in area</option>
                </select>
                <input type="hidden" id="loc_name" name="loc_name" value="">
                <div class="hotspot-hint" id="hotspot-hint"></div>
            </div>

            <div class="form-group">
                <label for="species_name">Species (optional)</label>
                <input type="text" id="species_name" name="species_name" list="species-list"
                       autocomplete="off" placeholder="e.g. American Robin">
                <datalist id="species-list"></datalist>
            </div>

            <div class="form-group">
                <div class="toggle-row">
                    <label class="switch" style="margin:0;">
                        <input type="checkbox" name="notable" id="notable">
                        <span class="slider round"></span>
                    </label>
                    <span class="notable-label">Notable sightings only</span>
                </div>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label for="dist">
                    <div class="slider-header">
                        <span>Search radius</span>
                        <span class="slider-value"><span id="dist-value">25</span> km</span>
                    </div>
                </label>
                <input type="range" id="dist" name="dist" min="5" max="50" value="25"
                       oninput="document.getElementById('dist-value').textContent = this.value">
            </div>

            <div class="form-group">
                <label for="back">
                    <div class="slider-header">
                        <span>Days back</span>
                        <span class="slider-value"><span id="back-value">14</span> days</span>
                    </div>
                </label>
                <input type="range" id="back" name="back" min="1" max="30" value="14"
                       oninput="document.getElementById('back-value').textContent = this.value">
            </div>

            <hr class="divider">

            <button type="button" class="btn-location" id="use-location-button">
                &#x1F4CD; Use my location
            </button>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary" onclick="submitForm('/results')">List View</button>
                <button type="submit" class="btn btn-secondary" onclick="submitForm('/map')">Map View</button>
            </div>

        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

<script>
    fetch('/api/species')
        .then(function(r) { return r.json(); })
        .then(function(names) {
            var dl = document.getElementById('species-list');
            names.forEach(function(name) {
                var opt = document.createElement('option');
                opt.value = name;
                dl.appendChild(opt);
            });
        });
</script>

<script>
    var speciesInput = document.getElementById('species_name');
    var notableToggle = document.getElementById('notable');

    speciesInput.addEventListener('input', function() {
        var hasSpecies = this.value.trim().length > 0;
        notableToggle.disabled = hasSpecies;
        if (hasSpecies) notableToggle.checked = false;
    });

    notableToggle.addEventListener('change', function() {
        speciesInput.disabled = this.checked;
        if (this.checked) speciesInput.value = '';
    });

    function loadHotspots() {
        var loc = document.getElementById('location').value.trim();
        if (!loc) return;
        var dist = document.getElementById('dist').value;
        var hint = document.getElementById('hotspot-hint');
        var group = document.getElementById('hotspot-group');
        var select = document.getElementById('hotspot-select');
        hint.textContent = 'Finding hotspots…';
        group.style.display = 'block';
        fetch('/api/hotspots?location=' + encodeURIComponent(loc) + '&dist=' + dist)
            .then(function(r) { return r.json(); })
            .then(function(hotspots) {
                select.innerHTML = '<option value="">All locations in area</option>';
                hotspots.forEach(function(h) {
                    var opt = document.createElement('option');
                    opt.value = h.locId;
                    opt.dataset.name = h.locName;
                    opt.textContent = h.locName + (h.numSpecies ? ' (' + h.numSpecies + ' species)' : '');
                    select.appendChild(opt);
                });
                hint.textContent = hotspots.length + ' hotspot' + (hotspots.length !== 1 ? 's' : '') + ' found';
            })
            .catch(function() { hint.textContent = ''; });
    }

    document.getElementById('location').addEventListener('blur', loadHotspots);

    document.getElementById('hotspot-select').addEventListener('change', function() {
        var opt = this.options[this.selectedIndex];
        document.getElementById('loc_name').value = opt.dataset.name || '';
    });

    function submitForm(endpoint) {
        if (document.getElementById('location').value === '') {
            alert('Please enter a location.');
            return;
        }
        document.getElementById('loading-overlay').style.display = 'flex';
        var form = document.getElementById('dataForm');
        form.action = endpoint;
        form.submit();
    }
</script>
</body>
</html>
